<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Fan Voting</title>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
    min-height:100vh;
    padding:20px;
    margin:0;
}
h1{
    color:white;
    font-size:48px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-bottom:30px;
}
.match{
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(240,240,255,0.95) 100%);
    margin:20px auto;
    padding:30px;
    max-width:500px;
    border-radius:15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    border: 3px solid rgba(255,255,255,0.3);
}
.match h2{
    color:#1e3c72;
    margin-top:0;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:1px;
}
.match h3{
    color:#2a5298;
    font-size:24px;
    margin:15px 0;
}
button{
    padding:12px 24px;
    margin:8px;
    cursor:pointer;
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(231,76,60,0.4);
}
button:hover{
    background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(231,76,60,0.6);
}
button:active{
    transform: translateY(0) scale(0.98);
}
p{
    font-size:18px;
    margin:12px 0;
    color:#333;
    font-weight:bold;
}
span{
    color:#e74c3c;
    font-size:24px;
}
</style>
</head>
<body>

<h1>⚽ World Cup Fan Vote</h1>

<div class="match">
    <h2>Today's Match</h2>
    <h3 id="todayMatch">Mexico vs South Africa</h3>

    <button onclick="vote('Mexico')">Vote for Mexico</button>
    <button onclick="vote('South Africa')">Vote for South Africa</button>

    <p>Mexico Votes: <span id="mexicoVotes">0</span></p>
    <p>South Africa Votes: <span id="saVotes">0</span></p>
</div>

<div class="match">
    <h2>Tomorrow Morning</h2>
    <h3>South Korea vs Czech Republic</h3>

    <button onclick="vote('South Korea')">Vote for South Korea</button>
    <button onclick="vote('Czech Republic')">Vote for Czech Republic</button>

    <p>South Korea Votes: <span id="koreaVotes">0</span></p>
    <p>Czech Republic Votes: <span id="czechVotes">0</span></p>
</div>

<script type="module">
// Import Firebase modules
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

// Your Firebase configuration (replace with your actual config)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID",
    databaseURL: "YOUR_DATABASE_URL"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Vote function
window.vote = function(team){
    const voteRef = ref(db, "votes/" + team);
    
    runTransaction(voteRef, (currentVotes)=>{
        return (currentVotes || 0) + 1;
    });
}

// Listen for Mexico votes
onValue(ref(db,"votes/Mexico"),(snapshot)=>{
    document.getElementById("mexicoVotes").textContent = snapshot.val() || 0;
});

// Listen for South Africa votes
onValue(ref(db,"votes/South Africa"),(snapshot)=>{
    document.getElementById("saVotes").textContent = snapshot.val() || 0;
});

// Listen for South Korea votes
onValue(ref(db,"votes/South Korea"),(snapshot)=>{
    document.getElementById("koreaVotes").textContent = snapshot.val() || 0;
});

// Listen for Czech Republic votes
onValue(ref(db,"votes/Czech Republic"),(snapshot)=>{
    document.getElementById("czechVotes").textContent = snapshot.val() || 0;
});

</script>

</body>
</html>
