<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Vote</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

h1 { margin-top: 20px; }

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.team1 { background: #00c853; color: white; }
.team2 { background: #ff1744; color: white; }

.count { margin-top: 10px; }
</style>
</head>

<body>

<h1>⚽ World Cup Predictor</h1>

<!-- TODAY MATCH -->
<div class="card">
  <h2>Today</h2>
  <h3>Mexico vs South Africa</h3>

  <button class="team1" onclick="vote('mexico')">Mexico</button>
  <button class="team2" onclick="vote('sa')">South Africa</button>

  <div class="count">
    Mexico: <span id="mexico">0</span><br>
    South Africa: <span id="sa">0</span>
  </div>
</div>

<!-- MORNING MATCH -->
<div class="card">
  <h2>Tomorrow Morning</h2>
  <h3>South Korea vs Czech Republic</h3>

  <button class="team1" onclick="vote('korea')">South Korea</button>
  <button class="team2" onclick="vote('czech')">Czech Republic</button>

  <div class="count">
    South Korea: <span id="korea">0</span><br>
    Czech Republic: <span id="czech">0</span>
  </div>
</div>

<script>
function loadVotes(){
  let keys = ["mexico","sa","korea","czech"];

  keys.forEach(k=>{
    document.getElementById(k).innerText = localStorage.getItem(k) || 0;
  });
}

function vote(team){
  let current = localStorage.getItem(team) || 0;
  current++;
  localStorage.setItem(team, current);
  loadVotes();
}

loadVotes();
</script>

</body>
</html>
